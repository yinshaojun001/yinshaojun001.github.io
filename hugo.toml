baseURL = "https://yinshaojun001.github.io/"
languageCode = "zh-cn"
title = "尹绍钧"
defaultContentLanguage = "zh"
enableRobotsTXT = true
hasCJKLanguage = true
summaryLength = 120

[params]
  author = "尹绍钧"
  tagline = "个人介绍 + 技术输出"
  description = "以技术文章为主，兼顾个人介绍与长期积累。"
  mainSections = ["posts"]

[taxonomies]
  tag = "tags"
  series = "series"

[permalinks]
  posts = "/posts/:slug/"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    pageRef = "/"
    weight = 10
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    pageRef = "/posts"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    pageRef = "/about"
    weight = 30
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    pageRef = "/tags"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    lineNos = false
    style = "github-dark"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]
