server {
    listen 80;
    server_name blog.inshocking.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name blog.inshocking.com;

    ssl_certificate /etc/letsencrypt/live/blog.inshocking.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.inshocking.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/blog;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
