<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    {{ if .IsHome }}
    <div id="brand-intro" class="brand-intro">
      <video id="brand-video" muted playsinline>
        <source src="/brand.mp4" type="video/mp4">
      </video>
      <div id="brand-tap" class="brand-tap">
        <div class="brand-tap-hint">
          <span class="brand-tap-dot"></span>
          点击任意处开始
        </div>
      </div>
      <button class="brand-skip" id="brand-skip-btn" style="display:none" onclick="skipIntro()">跳过</button>
    </div>
    <script>
      (function() {
        var key = 'brand_seen_v1';
        var seen = sessionStorage.getItem(key);
        var intro = document.getElementById('brand-intro');
        if (seen) {
          intro.style.display = 'none';
          return;
        }
        document.body.style.overflow = 'hidden';
        var video = document.getElementById('brand-video');
        var tapLayer = document.getElementById('brand-tap');
        var skipBtn = document.getElementById('brand-skip-btn');

        function endIntro() {
          sessionStorage.setItem(key, '1');
          intro.classList.add('brand-intro--out');
          document.body.style.overflow = '';
          setTimeout(function() { intro.style.display = 'none'; }, 600);
        }

        function startVideo() {
          tapLayer.style.display = 'none';
          skipBtn.style.display = 'block';
          video.play().catch(function() {
            endIntro();
          });
        }

        tapLayer.addEventListener('click', startVideo);
        video.addEventListener('ended', endIntro);
        window.skipIntro = endIntro;

        // 桌面端直接尝试自动播放
        video.play().then(function() {
          tapLayer.style.display = 'none';
          skipBtn.style.display = 'block';
        }).catch(function() {
          // 自动播放失败（移动端），显示点击层
          tapLayer.style.display = 'flex';
        });
      })();
    </script>
    {{ end }}
    <div class="site-shell">
      {{ partial "header.html" . }}
      <main class="main-shell">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
  </body>
</html>
